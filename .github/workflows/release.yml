name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-aarch64

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build soil-query-api
        run: cargo build --release --bin soil-query-api --target ${{ matrix.target }}

      - name: Build soil-query CLI
        run: cargo build --release --bin soil-query --target ${{ matrix.target }}

      # --- Linux / macOS: rename binaries ---
      - name: Rename binaries (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/soil-query-api \
             soil-query-api-${{ matrix.artifact_suffix }}
          cp target/${{ matrix.target }}/release/soil-query \
             soil-query-${{ matrix.artifact_suffix }}

      # --- Windows: rename binaries ---
      - name: Rename binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\soil-query-api.exe" `
                    "soil-query-api-${{ matrix.artifact_suffix }}.exe"
          Copy-Item "target\${{ matrix.target }}\release\soil-query.exe" `
                    "soil-query-${{ matrix.artifact_suffix }}.exe"

      # --- Upload artifacts for the release job ---
      - name: Upload artifacts (Unix)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.artifact_suffix }}
          path: |
            soil-query-api-${{ matrix.artifact_suffix }}
            soil-query-${{ matrix.artifact_suffix }}

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.artifact_suffix }}
          path: |
            soil-query-api-${{ matrix.artifact_suffix }}.exe
            soil-query-${{ matrix.artifact_suffix }}.exe

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v1.0.0-beta → prerelease
          generate_release_notes: true
          files: artifacts/*